spring.application.name=ride-management-backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
server.port=${PORT:8099}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ride_management_db}
spring.datasource.username=${DATABASE_USERNAME:ride_user}
spring.datasource.password=${DATABASE_PASSWORD:ride_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-secret-for-production-campus-ride-management}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173}
